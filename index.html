<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XIT STORE - UNLOCKER</title>
    
    <script type="text/javascript">
    (function() {
        var urlAnuncios = "https://fenixdigitar.blogspot.com/search?updated-max=2025-12-02T20:41:03-08:00&max-results=5&m=1#PageNo=17";
        var dominioPermitido = "fenixdigitar.blogspot.com";
        var completadoTodo = false;

        // 1. VALIDACIÓN DE ENTRADA (REFERRER)
        if (!document.referrer || document.referrer.indexOf(dominioPermitido) === -1) {
            window.location.replace(urlAnuncios);
        }

        // 2. DETECTOR DE MINIMIZAR / CAMBIO DE PESTAÑA
        document.addEventListener("visibilitychange", function() {
            if (document.visibilityState === 'hidden' && !completadoTodo) {
                window.location.replace(urlAnuncios);
            }
        });

        // 3. DETECTOR DE RECARGA (F5)
        if (window.performance && window.performance.navigation.type === window.performance.navigation.TYPE_RELOAD) {
            window.location.replace(urlAnuncios);
        }

        // 4. BLOQUEO DE BOTÓN ATRÁS
        history.pushState(null, null, location.href);
        window.onpopstate = function () {
            if (!completadoTodo) {
                window.location.replace(urlAnuncios);
            }
        };

        window.liberarUsuario = function() { completadoTodo = true; };
    })();
    </script>

    <style>
        :root {
            --cyan: #00f2ff;
            --magenta: #ff0055;
            --gold: #ffcc00;
            --bg: #000000;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 100vh;
        }

        .main-card {
            background: #0a0a0a; border: 2px solid var(--cyan);
            width: 90%; max-width: 350px; padding: 25px; border-radius: 25px;
            text-align: center; box-sizing: border-box;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.15);
        }

        h1 { color: var(--cyan); font-size: 24px; margin: 0 0 10px 0; font-weight: 900; }
        p { font-size: 12px; color: #888; margin-bottom: 25px; }

        .step-btn {
            display: flex; align-items: center; justify-content: center;
            background: #111; border: 1px solid #333; padding: 16px;
            border-radius: 15px; margin-bottom: 12px; text-decoration: none;
            color: white; font-weight: 900; font-size: 12px; transition: 0.3s;
            text-transform: uppercase; cursor: pointer;
        }

        .step-btn.done { 
            background: rgba(0, 242, 255, 0.1) !important; 
            border-color: var(--cyan) !important;
            color: var(--cyan) !important;
        }

        #error-msg {
            color: var(--magenta); font-size: 11px; font-weight: 800;
            display: none; margin-bottom: 15px; background: rgba(255, 0, 85, 0.1);
            padding: 8px; border-radius: 8px;
        }

        #download-btn {
            display: block; width: 100%; padding: 18px; margin-top: 10px;
            border-radius: 15px; background: #1a1a1a; color: #444;
            text-align: center; font-weight: 900; text-decoration: none;
            pointer-events: none; border: 1px solid #222; text-transform: uppercase;
            font-size: 13px;
        }

        #download-btn.ready {
            background: var(--gold); color: black;
            box-shadow: 0 0 25px rgba(255, 204, 0, 0.4); 
            pointer-events: auto; cursor: pointer; border: none;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <h1>XIT UNLOCKER</h1>
        <p id="status-text">SIGUE LOS PASOS PARA DESBLOQUEAR</p>
        
        <div id="error-msg">⚠️ ERROR: (completa los pasoos de verdad)</div>

        <a href="https://www.youtube.com/@XitzX7?sub_confirmation=1" target="_blank" class="step-btn" id="step1" onclick="verificar(1)">
            1. SUSCRIBIRSE AL CANAL
        </a>

        <a href="https://youtu.be/S3RC2xLkMQI" target="_blank" class="step-btn" id="step2" onclick="verificar(2)">
            2. DAR LIKE AL VIDEO
        </a>

        <a href="https://youtu.be/S3RC2xLkMQI" target="_blank" class="step-btn" id="step3" onclick="verificar(3)">
            3. COMENTAR EN EL VIDEO
        </a>

        <a href="https://whatsapp.com/channel/0029VbCKayIJkK79xojzCS1a" target="_blank" class="step-btn" id="step4" onclick="verificar(4)">
            4. UNIRSE AL WHATSAPP
        </a>

        <button id="download-btn">LINK BLOQUEADO</button>
    </div>

    <script>
        let tareas = { 1: false, 2: false, 3: false, 4: false };
        let timerOut = 0;
        let completadas = 0;

        function verificar(n) {
            if (tareas[n]) return;
            timerOut = Date.now();
            const btn = document.getElementById('step' + n);

            window.onfocus = function() {
                let timerIn = Date.now();
                let segs = (timerIn - timerOut) / 1000;

                // 1s de delay + 0.9s de espera real = 1.9s totales
                if (segs < 1.9) {
                    document.getElementById('error-msg').style.display = 'block';
                } else {
                    document.getElementById('error-msg').style.display = 'none';
                    tareas[n] = true;
                    btn.classList.add('done');
                    btn.innerText = "✓ COMPLETADO";
                    completadas++;
                    
                    if (completadas >= 4) {
                        window.liberarUsuario(); // IMPORTANTE: Desactiva expulsión
                        const dl = document.getElementById('download-btn');
                        document.getElementById('status-text').innerText = "¡PROCESO COMPLETADO!";
                        dl.innerText = "OBTENER ARCHIVO (MEDIAFIRE)";
                        dl.classList.add('ready');
                        dl.onclick = function() {
                            window.location.href = "https://www.mediafire.com/file/ttzvvdjpkqcn151/AUTO+APUNTADO+100";
                        };
                    }
                }
                window.onfocus = null;
            };
        }
    </script>
</body>
</html>
