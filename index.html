    <script type="text/javascript">
    (function() {
        var urlAnuncios = "https://fenixdigitar.blogspot.com/search?updated-max=2025-12-02T20:41:03-08:00&max-results=5&m=1#PageNo=17";
        var dominioPermitido = "fenixdigitar.blogspot.com";
        var completadoTodo = false;
        window.haciendoMision = false; 

        if (!document.referrer || document.referrer.indexOf(dominioPermitido) === -1) {
            window.location.replace(urlAnuncios);
        }

        document.addEventListener("visibilitychange", function() {
            if (document.visibilityState === 'hidden' && !completadoTodo && !window.haciendoMision) {
                window.location.replace(urlAnuncios);
            }
        });

        if (window.performance && window.performance.navigation.type === window.performance.navigation.TYPE_RELOAD) {
            window.location.replace(urlAnuncios);
        }

        history.pushState(null, null, location.href);
        window.onpopstate = function () {
            if (!completadoTodo) { window.location.replace(urlAnuncios); }
        };

        window.liberarUsuario = function() { completadoTodo = true; };
    })();
    </script>

    <style>
        :root {

            --bg: #000000;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0; display: flex; align-items: center;
            justify-content: center; min-height: 100vh;
        }

        /* --- INTERFAZ 1: SELECTOR MORADO --- */
        #pantalla-inicio {
            background: #050005; border: 2px solid var(--fucsia);
            width: 90%; max-width: 380px; padding: 30px 20px;

        .lock-icon {
            width: 50px; height: 50px; border: 1.5px solid var(--fucsia);

        }

        .sub-morado { color: var(--fucsia); font-size: 12px; margin: 10px 0 30px; opacity: 0.8; }
        
        .selector-grid { display: flex; justify-content: space-around; gap: 10px; }

            background: none; border: none; color: white; font-weight: 800; 
            font-size: 11px; cursor: pointer; text-transform: uppercase;
            padding: 10px; transition: 0.3s;
        }
        .opt-btn:hover { color: var(--fucsia); text-shadow: 0 0 8px var(--fucsia); }

        /* --- INTERFAZ 2: MISIONES CYAN (OCULTA AL PRINCIPIO) --- */
        #pantalla-misiones {
            display: none; background: #0a0a0a; border: 2px solid var(--cyan);
            width: 90%; max-width: 350px; padding: 25px; border-radius: 25px;
            text-align: center; box-shadow: 0 0 30px rgba(0, 242, 255, 0.15);
        }
        #pantalla-misiones h1 { color: var(--cyan); font-size: 24px; margin: 0 0 10px 0; font-weight: 900; }
        #status-text { font-size: 12px; color: #888; margin-bottom: 25px; }

        .step-btn {
            display: flex; align-items: center; justify-content: center;
            background: #111; border: 1px solid #333; padding: 16px;
            border-radius: 15px; margin-bottom: 12px; text-decoration: none;
            color: white; font-weight: 900; font-size: 12px; transition: 0.3s;
            text-transform: uppercase;
        }
        .step-btn.done { border-color: var(--cyan) !important; color: var(--cyan) !important; background: rgba(0, 242, 255, 0.1); }

        #error-msg { color: #ff0055; font-size: 11px; font-weight: 800; display: none; margin-bottom: 15px; }

        #download-btn {
            display: block; width: 100%; padding: 18px; margin-top: 10px;
            border-radius: 15px; background: #1a1a1a; color: #444;
            text-align: center; font-weight: 900; text-decoration: none;
            pointer-events: none; border: 1px solid #222; text-transform: uppercase;
        }
        #download-btn.ready { background: #ffcc00; color: black; box-shadow: 0 0 25px rgba(255, 204, 0, 0.4); pointer-events: auto; border: none; }
    </style>
</head>
<body>

    <div id="pantalla-inicio">
        <div class="lock-icon">🔒</div>
        <h1 class="title-morado">XitzX7</h1>
        <p class="sub-morado">Panel de acceso exclusivo</p>
        
        <div class="selector-grid">
            <button class="opt-btn" onclick="activarMisiones('17 DE ABRIL', 'https://youtu.be/S3RC2xLkMQI', 'https://www.mediafire.com/file/ttzvvdjpkqcn151/AUTO+APUNTADO+100')">
                17 DE ABRIL<br><span style="font-size:9px; opacity:0.7;">AUTO APUNTADO</span>
            </button>
            <button class="opt-btn" onclick="activarMisiones('18 DE ABRIL', 'LINK_VIDEO_18', 'LINK_MEDIAFIRE_18')">
                18 DE ABRIL<br><span style="font-size:9px; opacity:0.7;">NUEVO MÉTODO</span>
            </button>
        </div>
    </div>

    <div id="pantalla-misiones">
        <h1 id="header-mision">XIT UNLOCKER</h1>
        <p id="status-text">REALIZA LOS PASOS PARA DESCARGAR</p>
        
        <div id="error-msg">⚠️ ERROR: (completa los pasos de verdad)</div>

        <a href="https://www.youtube.com/@XitzX7?sub_confirmation=1" target="_blank" class="step-btn" id="s1" onclick="verificar(1)">1. SUSCRIBIRSE AL CANAL</a>
        <a href="#" target="_blank" class="step-btn" id="s2" onclick="verificar(2)">2. DAR LIKE AL VIDEO</a>
        <a href="#" target="_blank" class="step-btn" id="s3" onclick="verificar(3)">3. COMENTAR EN EL VIDEO</a>
        <a href="https://whatsapp.com/channel/0029VbCKayIJkK79xojzCS1a" target="_blank" class="step-btn" id="s4" onclick="verificar(4)">4. UNIRSE AL WHATSAPP</a>

        <button id="download-btn">LINK BLOQUEADO</button>
    </div>

    <script>
        let tareas = { 1: false, 2: false, 3: false, 4: false };
        let timerOut = 0;
        let completadas = 0;
        let linkDescargaFinal = "";

        function activarMisiones(fecha, video, descarga) {
            // OCULTA TOTALMENTE EL PANEL MORADO
            document.getElementById('pantalla-inicio').style.display = 'none';
            
            // MUESTRA EL PANEL CYAN DE MISIONES
            document.getElementById('pantalla-misiones').style.display = 'block';
            
            // Configura los links según lo que eligió
            document.getElementById('header-mision').innerText = fecha;
            document.getElementById('s2').href = video;
            document.getElementById('s3').href = video;
            linkDescargaFinal = descarga;
        }

        function verificar(n) {
            if (tareas[n]) return;
            
            window.haciendoMision = true; 
            timerOut = Date.now();
            const btn = document.getElementById('s' + n);

            window.onfocus = function() {
                let segs = (Date.now() - timerOut) / 1000;
                
                // Pequeño delay para reactivar la seguridad
                setTimeout(() => { window.haciendoMision = false; }, 1000);

                if (segs < 1.9) {
                    document.getElementById('error-msg').style.display = 'block';
                } else {
                    document.getElementById('error-msg').style.display = 'none';
                    tareas[n] = true;
                    btn.classList.add('done');
                    btn.innerText = "✓ COMPLETADO";
                    completadas++;
                    
                    if (completadas >= 4) {
                        window.liberarUsuario();
                        const dl = document.getElementById('download-btn');
                        document.getElementById('status-text').innerText = "¡TODO LISTO!";
                        dl.innerText = "DESCARGAR ARCHIVO";
                        dl.classList.add('ready');
                        dl.onclick = function() { window.location.href = linkDescargaFinal; };
                    }
                }
                window.onfocus = null;
            };
        }
    </script>
</body>
