    <script type="text/javascript">
    (function() {
        var urlAnuncios = "https://fenixdigitar.blogspot.com/search?updated-max=2025-12-02T20:41:03-08:00&max-results=5&m=1#PageNo=17";
        var dominioPermitido = "fenixdigitar.blogspot.com";
        var completadoTodo = false;
        window.haciendoMision = false; 

        if (!document.referrer || document.referrer.indexOf(dominioPermitido) === -1) {
            window.location.replace(urlAnuncios);
        }

        document.addEventListener("visibilitychange", function() {
            if (document.visibilityState === 'hidden' && !completadoTodo && !window.haciendoMision) {
                window.location.replace(urlAnuncios);
            }
        });

        if (window.performance && window.performance.navigation.type === window.performance.navigation.TYPE_RELOAD) {
            window.location.replace(urlAnuncios);
        }

        history.pushState(null, null, location.href);
        window.onpopstate = function () {
            if (!completadoTodo) { window.location.replace(urlAnuncios); }
        };

        window.liberarUsuario = function() { completadoTodo = true; };
    })();
    </script>

    <style>

        }

        /* Selector de opciones */

            display: flex; 
            justify-content: space-around; 
            gap: 5px;
            border-top: 1px solid rgba(255,255,255,0.1);

        }
        
        .opt-btn { 
            background: none; border: none; color: white; font-weight: 800; 
            font-size: 10px; cursor: pointer; text-transform: uppercase;
            flex: 1;
        }
        .opt-btn span { color: var(--fucsia); display: block; font-size: 8px; margin-top: 3px; }

        /* Botones de misiones */
        .step-btn {
            display: block;
            background: #111; 
            border: 1px solid #333; 
            padding: 12px;

            margin-bottom: 8px;

            font-weight: 800;

        .step-btn.done { border-color: var(--cyan); color: var(--cyan); background: rgba(0, 242, 255, 0.05); }

<body>

    <div id="pantalla-inicio" class="card-container">
        <div class="lock-icon">🔒</div>

        <div class="selector-grid">
            <button class="opt-btn" onclick="activar('17 DE ABRIL', 'https://youtu.be/S3RC2xLkMQI', 'https://www.mediafire.com/file/ttzvvdjpkqcn151/AUTO+APUNTADO+100')">
                17 DE ABRIL <span>AUTO APUNTADO</span>
            </button>
            <button class="opt-btn" onclick="activar('18 DE ABRIL', 'URL_VIDEO_18', 'URL_MEDIAFIRE_18')">
                18 DE ABRIL <span>NUEVO MÉTODO</span>
            </button>
        </div>
    </div>

    <div id="pantalla-misiones" class="card-container">
        <h1 id="header-mision" class="title-cyan">XIT UNLOCKER</h1>
        <span class="sub-text">COMPLETA LOS PASOS</span>
        
        <div id="error-msg">⚠️ ERROR: (PASOS INCOMPLETOS)</div>

        <a href="https://www.youtube.com/@XitzX7?sub_confirmation=1" target="_blank" class="step-btn" id="s1" onclick="verificar(1)">1. SUSCRIBIRSE</a>
        <a href="#" target="_blank" class="step-btn" id="s2" onclick="verificar(2)">2. DAR LIKE</a>
        <a href="#" target="_blank" class="step-btn" id="s3" onclick="verificar(3)">3. COMENTAR</a>
        <a href="https://whatsapp.com/channel/0029VbCKayIJkK79xojzCS1a" target="_blank" class="step-btn" id="s4" onclick="verificar(4)">4. WHATSAPP</a>

        <button id="download-btn" class="dl-btn">BLOQUEADO</button>
    </div>

    <script>
        let tareas = { 1: false, 2: false, 3: false, 4: false };
        let timerOut = 0;
        let completadas = 0;
        let linkFinal = "";

        function activar(fecha, video, descarga) {
            document.getElementById('pantalla-inicio').style.display = 'none';
            document.getElementById('pantalla-misiones').style.display = 'block';
            document.getElementById('header-mision').innerText = fecha;
            document.getElementById('s2').href = video;
            document.getElementById('s3').href = video;
            linkFinal = descarga;
        }

        function verificar(n) {
            if (tareas[n]) return;
            window.haciendoMision = true; 
            timerOut = Date.now();
            const btn = document.getElementById('s' + n);

            window.onfocus = function() {
                let segs = (Date.now() - timerOut) / 1000;
                setTimeout(() => { window.haciendoMision = false; }, 1000);

                if (segs < 1.9) {
                    document.getElementById('error-msg').style.display = 'block';
                } else {
                    document.getElementById('error-msg').style.display = 'none';
                    tareas[n] = true;
                    btn.classList.add('done');
                    btn.innerText = "✓ LISTO";
                    completadas++;
                    
                    if (completadas >= 4) {
                        window.liberarUsuario();
                        const dl = document.getElementById('download-btn');
                        dl.innerText = "DESCARGAR AHORA";
                        dl.classList.add('ready');
                        dl.onclick = function() { window.location.href = linkFinal; };
                    }
                }
                window.onfocus = null;
            };
        }
    </script>
