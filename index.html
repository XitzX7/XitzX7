<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XITZX7 - UNLOCKER</title>
    
    <script type="text/javascript">
    (function() {
        var urlAnuncios = "https://fenixdigitar.blogspot.com/search?updated-max=2025-12-02T20:41:03-08:00&max-results=5&m=1#PageNo=17";
        var dominioPermitido = "fenixdigitar.blogspot.com";

        if (!document.referrer || document.referrer.indexOf(dominioPermitido) === -1) {
            window.location.replace(urlAnuncios);
        }

        if (window.performance && window.performance.navigation.type === window.performance.navigation.TYPE_RELOAD) {
            window.location.replace(urlAnuncios);
        }
    })();

    <style>
        :root { --cyan: #00f2ff; --bg: #000000; }
        body { 
            background-color: var(--bg); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
        }
        .card-container { 
            width: 85%; 
            max-width: 310px; 
            padding: 25px; 
            border-radius: 25px; 
            text-align: center; 
            box-sizing: border-box; 
            background: #0a0a0a; 
            border: 2px solid var(--cyan); 
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }
        .lock-icon { font-size: 20px; color: var(--cyan); margin-bottom: 8px; }
        h1 { font-size: 22px; font-weight: 900; margin: 5px 0; text-transform: uppercase; }
        .title-cyan { color: var(--cyan); text-shadow: 0 0 8px var(--cyan); }
        .sub-text { font-size: 10px; color: #888; margin-bottom: 18px; display: block; letter-spacing: 1px; }
        .step-btn { display: block; background: #111; border: 1px solid #222; padding: 12px; border-radius: 12px; margin-bottom: 8px; text-decoration: none; color: white; font-weight: 800; font-size: 10px; text-transform: uppercase; }
        .step-btn.done { border-color: var(--cyan); color: var(--cyan); background: rgba(0, 242, 255, 0.05); }
        #error-msg { color: #ff0055; font-size: 9px; font-weight: 800; display: none; margin-bottom: 8px; }
        .dl-btn { display: block; width: 100%; padding: 14px; margin-top: 10px; border-radius: 12px; background: #1a1a1a; color: #444; font-weight: 900; text-decoration: none; pointer-events: none; border: 1px solid #222; font-size: 11px; }
        .dl-btn.ready { background: #ffcc00; color: black; pointer-events: auto; border: none; box-shadow: 0 0 15px rgba(255, 204, 0, 0.3); }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="lock-icon">🔒</div>
        <h1 class="title-cyan">ESPERA UN MOMENTO...</h1>
        <span class="sub-text">COMPLETA LOS PASOS</span>
        
        <div id="error-msg">⚠️ ESPERA UN MOMENTO...</div>

        <a href="https://www.youtube.com/@XitzX7?sub_confirmation=1" target="_blank" class="step-btn" id="s1" onclick="verificar(1)">1. SUSCRIBIRSE AL CANAL</a>
        
        <a href="https://youtu.be/JJshIt8cjLg?si=YRtVBtmBDRd8qgKY" target="_blank" class="step-btn" id="s2" onclick="verificar(2)">2. DAR LIKE AL VIDEO</a>
        <a href="https://youtu.be/JJshIt8cjLg?si=YRtVBtmBDRd8qgKY" target="_blank" class="step-btn" id="s3" onclick="verificar(3)">3. COMENTAR EN EL VIDEO</a>

        <button id="download-btn" class="dl-btn">LINK BLOQUEADO</button>
    </div>

    <script>
        let tareas = { 1: false, 2: false, 3: false };
        let completadas = 0;
        let timerOut = 0;
        // Enlace final que proporcionaste
        let linkFinal = "https://www.mediafire.com/file/6crte91p8qcisxn/AUTOAPUNTADO+BRUTAL+HACK👹.7z/file";

        function verificar(n) {
            if (tareas[n]) return;
            timerOut = Date.now();
            const btn = document.getElementById('s' + n);

            window.onfocus = function() {
                let tiempoTotal = (Date.now() - timerOut) / 1000;
                
                if (tiempoTotal < 1.4) {
                    document.getElementById('error-msg').style.display = 'block';
                    document.getElementById('error-msg').innerText = "⚠️ ERROR: PASO MUY RÁPIDO";
                } else {
                    document.getElementById('error-msg').style.display = 'none';
                    tareas[n] = true;
                    btn.classList.add('done');
                    btn.innerText = "✓ LISTO";
                    completadas++;
                    
                    if (completadas >= 3) {
                        const dl = document.getElementById('download-btn');
                        dl.innerText = "DESCARGAR AHORA";
                        dl.classList.add('ready');
                        dl.onclick = function() { window.location.href = linkFinal; };
                    }
                }
                window.onfocus = null;
            };
        }
    </script>
</body>
</html>
