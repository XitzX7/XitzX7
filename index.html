    <script type="text/javascript">
    (function() {
        var urlAnuncios = "https://fenixdigitar.blogspot.com/search?updated-max=2025-12-02T20:41:03-08:00&max-results=5&m=1#PageNo=17";
        var dominioPermitido = "fenixdigitar.blogspot.com";
        var completadoTodo = false;
        window.haciendoMision = false; // Nueva variable para evitar expulsión por error

        // 1. VALIDACIÓN DE ENTRADA
        if (!document.referrer || document.referrer.indexOf(dominioPermitido) === -1) {
            window.location.replace(urlAnuncios);
        }

        // 2. DETECTOR DE MINIMIZAR (MEJORADO)
        document.addEventListener("visibilitychange", function() {
            // Solo expulsa si la página se oculta Y NO estamos haciendo una misión
            if (document.visibilityState === 'hidden' && !completadoTodo && !window.haciendoMision) {
                window.location.replace(urlAnuncios);
            }
        });

        // 3. DETECTOR DE RECARGA
        if (window.performance && window.performance.navigation.type === window.performance.navigation.TYPE_RELOAD) {
            window.location.replace(urlAnuncios);
        }

        // 4. BLOQUEO DE BOTÓN ATRÁS
        history.pushState(null, null, location.href);
        window.onpopstate = function () {
            if (!completadoTodo) { window.location.replace(urlAnuncios); }
        };

        window.liberarUsuario = function() { completadoTodo = true; };
    })();
    </script>

    <style>

            --fucsia: #ff00ff;

        body {

            overflow-x: hidden;
        }

        /* --- PANEL INICIAL (MORADO) --- */
        .panel-morado {
            background: #050005; border: 2px solid var(--fucsia);

            box-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
        }

        .text-side { display: flex; justify-content: space-between; margin: 25px 0; }

        .opt-text:hover { color: var(--fucsia); }

        /* --- PANEL MISIONES (CYAN - EL ORIGINAL) --- */
        .panel-cyan {
            display: none; background: #0a0a0a; border: 2px solid var(--cyan);
            width: 90%; max-width: 350px; padding: 25px; border-radius: 25px;
            text-align: center; box-shadow: 0 0 30px rgba(0, 242, 255, 0.15);
        }
        .panel-cyan h1 { color: var(--cyan); font-size: 24px; margin: 0 0 10px 0; font-weight: 900; }

        .step-btn {
            display: flex; align-items: center; justify-content: center;
            background: #111; border: 1px solid #333; padding: 16px;
            border-radius: 15px; margin-bottom: 12px; text-decoration: none;
            color: white; font-weight: 900; font-size: 12px; transition: 0.3s;
            text-transform: uppercase;
        }
        .step-btn.done { border-color: var(--cyan) !important; color: var(--cyan) !important; background: rgba(0, 242, 255, 0.1); }

        #error-msg { color: #ff0055; font-size: 11px; font-weight: 800; display: none; margin-bottom: 15px; }

        #download-btn {
            display: block; width: 100%; padding: 18px; margin-top: 10px;

            text-align: center; font-weight: 900; text-decoration: none;

        #download-btn.ready { background: #ffcc00; color: black; box-shadow: 0 0 25px rgba(255, 204, 0, 0.4); pointer-events: auto; border: none; }

<body>

    <div id="pantalla-inicio" class="panel-morado">
        <div class="lock-icon">🔒</div>

        <p style="color:var(--fucsia); font-size:12px; margin-top:5px;">Panel de acceso exclusivo</p>
        
        <div class="text-side">
            <button class="opt-text" onclick="comenzar('17 DE ABRIL', 'https://youtu.be/S3RC2xLkMQI', 'https://www.mediafire.com/file/ttzvvdjpkqcn151/AUTO+APUNTADO+100')">17 DE ABRIL<br>AUTO APUNTADO</button>
            <button class="opt-text" onclick="comenzar('18 DE ABRIL', 'LINK_VIDEO_18', 'LINK_MEDIAFIRE_18')">18 DE ABRIL<br>NUEVO MÉTODO</button>
        </div>
    </div>

    <div id="pantalla-misiones" class="panel-cyan">
        <h1 id="tit-video">XIT UNLOCKER</h1>
        <p id="status-text" style="font-size:12px; color:#888; margin-bottom:20px;">SIGUE LOS PASOS PARA DESBLOQUEAR</p>
        
        <div id="error-msg">⚠️ ERROR: (completa los pasoos de verdad)</div>

        <a href="https://www.youtube.com/@XitzX7?sub_confirmation=1" target="_blank" class="step-btn" id="s1" onclick="verificar(1)">1. SUSCRIBIRSE AL CANAL</a>
        <a href="#" target="_blank" class="step-btn" id="s2" onclick="verificar(2)">2. DAR LIKE AL VIDEO</a>
        <a href="#" target="_blank" class="step-btn" id="s3" onclick="verificar(3)">3. COMENTAR EN EL VIDEO</a>
        <a href="https://whatsapp.com/channel/0029VbCKayIJkK79xojzCS1a" target="_blank" class="step-btn" id="s4" onclick="verificar(4)">4. UNIRSE AL WHATSAPP</a>

        <button id="download-btn">LINK BLOQUEADO</button>
    </div>

    <script>
        let tareas = { 1: false, 2: false, 3: false, 4: false };
        let timerOut = 0;
        let completadas = 0;
        let linkDescarga = "";

        function comenzar(fecha, video, descarga) {
            // Desaparece el morado, aparece el cyan
            document.getElementById('pantalla-inicio').style.display = 'none';
            document.getElementById('pantalla-misiones').style.display = 'block';
            
            document.getElementById('tit-video').innerText = fecha;
            document.getElementById('s2').href = video;
            document.getElementById('s3').href = video;
            linkDescarga = descarga;
        }

        function verificar(n) {
            if (tareas[n]) return;
            
            // ACTIVAMOS ESTO: Evita que el "Anti-Minimizar" te eche mientras vas a YT
            window.haciendoMision = true; 
            timerOut = Date.now();
            const btn = document.getElementById('s' + n);

            window.onfocus = function() {
                let segs = (Date.now() - timerOut) / 1000;
                
                // Volvemos a activar la protección después de 1 segundo de haber vuelto
                setTimeout(() => { window.haciendoMision = false; }, 1000);

                if (segs < 1.9) {
                    document.getElementById('error-msg').style.display = 'block';
                } else {
                    document.getElementById('error-msg').style.display = 'none';
                    tareas[n] = true;
                    btn.classList.add('done');
                    btn.innerText = "✓ COMPLETADO";
                    completadas++;
                    
                    if (completadas >= 4) {
                        window.liberarUsuario();
                        const dl = document.getElementById('download-btn');
                        document.getElementById('status-text').innerText = "¡PROCESO COMPLETADO!";
                        dl.innerText = "OBTENER ARCHIVO (MEDIAFIRE)";
                        dl.classList.add('ready');
                        dl.onclick = function() { window.location.href = linkDescarga; };
                    }
                }
                window.onfocus = null;
            };
        }
    </script>
