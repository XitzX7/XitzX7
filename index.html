<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XIT STORE - UNLOCKER</title>
    <style>
        :root {
            --cyan: #00f2ff;
            --magenta: #ff0055;
            --gold: #ffcc00;
            --bg: #000000;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 100vh;
        }

        .main-card {
            background: #0a0a0a; border: 2px solid var(--cyan);
            width: 90%; max-width: 350px; padding: 25px; border-radius: 25px;
            text-align: center; box-sizing: border-box;
        }

        h1 { color: var(--cyan); font-size: 24px; margin: 0 0 10px 0; font-weight: 900; }
        p { font-size: 12px; color: #888; margin-bottom: 25px; }

        .step-btn {
            display: flex; align-items: center; justify-content: center;
            background: #111; border: 1px solid #333; padding: 16px;
            border-radius: 15px; margin-bottom: 12px; text-decoration: none;
            color: white; font-weight: 900; font-size: 12px; transition: 0.4s;
            text-transform: uppercase; cursor: pointer;
        }

        .step-btn.done { 
            background: rgba(0, 242, 255, 0.2) !important; 
            border-color: var(--cyan) !important;
            color: var(--cyan) !important;
        }

        #download-btn {
            display: block; width: 100%; padding: 18px; margin-top: 20px;
            border-radius: 15px; background: #222; color: #555;
            text-align: center; font-weight: 900; text-decoration: none;
            pointer-events: none; border: none; text-transform: uppercase;
            font-size: 13px;
        }

        #download-btn.ready {
            background: var(--gold); color: black;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.5); 
            pointer-events: auto; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <h1>XIT UNLOCKER</h1>
        <p>SIGUE LOS PASOS PARA DESBLOQUEAR</p>

        <a href="https://www.youtube.com/@XitzX7?sub_confirmation=1" target="_blank" class="step-btn" id="step1" onclick="instantUnlock(1)">
            SUSCRIBIRSE AL CANAL
        </a>

        <a href="https://youtu.be/S3RC2xLkMQI" target="_blank" class="step-btn" id="step2" onclick="instantUnlock(2)">
            DAR LIKE AL VIDEO
        </a>

        <a href="https://youtu.be/S3RC2xLkMQI" target="_blank" class="step-btn" id="step3" onclick="instantUnlock(3)">
            COMENTAR EN EL VIDEO
        </a>

        <a href="https://whatsapp.com/channel/0029VbCKayIJkK79xojzCS1a" target="_blank" class="step-btn" id="step4" onclick="instantUnlock(4)">
            UNIRSE AL WHATSAPP
        </a>

        <button id="download-btn">LINK BLOQUEADO</button>
    </div>

    <script>
        let completedTasks = { 1: false, 2: false, 3: false, 4: false };

        function instantUnlock(num) {
            if (completedTasks[num]) return;
            
            // Se marca como completado al instante que hacen clic
            completedTasks[num] = true;
            const btn = document.getElementById('step' + num);
            btn.classList.add('done');
            btn.innerText = "✓ DESBLOQUEADO";
            
            checkFinal();
        }

        function checkFinal() {
            if (completedTasks[1] && completedTasks[2] && completedTasks[3] && completedTasks[4]) {
                const dlBtn = document.getElementById('download-btn');
                dlBtn.innerText = "OBTENER ARCHIVO (MEDIAFIRE)";
                dlBtn.classList.add('ready');
                dlBtn.onclick = function() {
                    window.location.href = "https://www.mediafire.com/file/ttzvvdjpkqcn151/AUTO+APUNTADO+100";
                };
            }
        }
    </script>
</body>
</html>
