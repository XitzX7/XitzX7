    <style>
        :root { 
            --cyan: #00f2ff; 
            --bg: #000000; 
        }

        body { 
            background-color: var(--bg); 
            color: #333; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }

        .card-container { 
            width: 90%; 
            max-width: 350px; 
            padding: 30px 20px; 
            border-radius: 15px; 
            text-align: left; 
            box-sizing: border-box; 
            background: #f8fbff; 
            border-left: 5px solid #007bff; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .header-info { display: flex; align-items: center; margin-bottom: 10px; }
        .dot { height: 8px; width: 8px; background-color: #007bff; border-radius: 50%; margin-right: 10px; box-shadow: 0 0 8px #007bff; }
        
        h1 { font-size: 18px; font-weight: 800; margin: 0; color: #222; text-transform: uppercase; }

        .date-badge {
            display: inline-block;
            background: #2d3446;
            color: white;
            padding: 5px 12px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: 600;
            margin: 15px 0;
        }

        /* Estilo de los Botones (Estilo Neón Azul) */
        .btn-action { 
            width: 100%; 
            padding: 16px; 
            margin-top: 10px; 
            border-radius: 8px; 
            background: #007bff; 
            color: white; 
            font-weight: 800; 
            border: none; 
            font-size: 14px; 
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.4);
            transition: 0.3s;
        }

        .btn-action:hover {
            background: #00f2ff;
            box-shadow: 0 0 20px #00f2ff;
            color: #000;
        }

        /* Barra de Carga */
        #loading-area { display: none; margin-top: 20px; }
        .progress-container {
            width: 100%;
            height: 15px;
            background: #e9ecef;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #007bff, #00f2ff);
            transition: width 0.1s linear;
        }
        .percent-text { display: block; text-align: right; font-weight: 700; color: #555; font-size: 14px; margin-top: 5px; }

        /* Botón oculto al inicio */
        #final-dl { display: none; }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="header-info">
            <span class="dot"></span>
            <h1>REGEDIT 90% CABEZA 📁</h1>
        </div>

        <div class="date-badge">15 ABRIL</div>

        <button id="start-btn" class="btn-action" onclick="iniciarCarga()">INICIAR</button>

        <div id="loading-area">
            <div class="progress-container">
                <div class="progress-bar" id="bar"></div>
            </div>
            <span class="percent-text" id="percent">0%</span>
        </div>

        <button id="final-dl" class="btn-action" onclick="descargar()">DESCARGAR AQUÍ</button>
    </div>

    <script>
        let linkFinal = "https://www.mediafire.com/file/6crte91p8qcisxn/AUTOAPUNTADO+BRUTAL+HACK👹.7z/file";

        function iniciarCarga() {
            // Escondo el botón de iniciar y muestro la carga
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('loading-area').style.display = 'block';

            let bar = document.getElementById('bar');
            let percentText = document.getElementById('percent');
            let width = 0;

            let interval = setInterval(function() {
                if (width >= 100) {
                    clearInterval(interval);
                    // Cuando termina, escondo carga y muestro botón final
                    document.getElementById('loading-area').style.display = 'none';
                    document.getElementById('final-dl').style.display = 'block';
                } else {
                    width++;
                    bar.style.width = width + '%';
                    percentText.innerText = width + '%';
                }
            }, 40); // Ajusta este número para que cargue más lento o más rápido
        }

        function descargar() {
            window.location.href = linkFinal;
        }
    </script>
</body>
</html>
