<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XITZX7 - PREMIUM ACCESS</title>
    
    <script type="text/javascript">
    (function() {
        var urlAnuncios = "https://fenixdigitar.blogspot.com/search?updated-max=2025-12-02T20:41:03-08:00&max-results=5&m=1#PageNo=17";
        var dominioPermitido = "fenixdigitar.blogspot.com";
        var completadoTodo = false;

        if (!document.referrer || document.referrer.indexOf(dominioPermitido) === -1) {
            window.location.replace(urlAnuncios);
        }

        document.addEventListener("visibilitychange", function() {
            if (document.visibilityState === 'hidden' && !completadoTodo) {
                window.location.replace(urlAnuncios);
            }
        });

        if (window.performance && window.performance.navigation.type === window.performance.navigation.TYPE_RELOAD) {
            window.location.replace(urlAnuncios);
        }

        history.pushState(null, null, location.href);
        window.onpopstate = function () {
            if (!completadoTodo) { window.location.replace(urlAnuncios); }
        };

        window.liberarUsuario = function() { completadoTodo = true; };
    })();
    </script>

    <style>
        :root {
            --fucsia: #ff00ff;
            --fucsia-glow: rgba(255, 0, 255, 0.6);
            --bg: #050005;
        }

        body {
            background-color: #000;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0; display: flex; align-items: center;
            justify-content: center; min-height: 100vh;
        }

        .main-card {
            background: var(--bg);
            border: 2px solid var(--fucsia);
            width: 90%; max-width: 380px;
            padding: 30px 20px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 0 20px var(--fucsia-glow), inset 0 0 10px var(--fucsia-glow);
        }

        .lock-icon {
            width: 60px; height: 60px;
            background: rgba(255, 0, 255, 0.1);
            border: 1.5px solid var(--fucsia);
            border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
            color: var(--fucsia); font-size: 30px;
            box-shadow: 0 0 15px var(--fucsia-glow);
        }

        h1 { font-size: 32px; margin: 0; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; color: #fff; text-shadow: 0 0 10px var(--fucsia); }
        .sub { font-size: 14px; color: var(--fucsia); margin-top: 10px; margin-bottom: 30px; opacity: 0.8; }

        /* Selector de archivos uno al lado del otro */
        .selector-container {
            display: flex; justify-content: space-around;
            margin-bottom: 25px; border-top: 1px solid rgba(255,0,255,0.2);
            padding-top: 15px;
        }
        .file-option {
            background: none; border: none; color: #fff;
            font-size: 11px; font-weight: bold; cursor: pointer;
            width: 45%; transition: 0.3s; padding: 5px;
        }
        .file-option.active { color: var(--fucsia); text-shadow: 0 0 5px var(--fucsia); }

        .misiones-box { display: none; margin-top: 10px; }

        .step-btn {
            display: block; background: #111; border: 1px solid #222;
            padding: 14px; border-radius: 12px; margin-bottom: 10px;
            text-decoration: none; color: #ccc; font-weight: 700;
            font-size: 12px; text-transform: uppercase; transition: 0.3s;
        }
        .step-btn.done { border-color: var(--fucsia); color: var(--fucsia); background: rgba(255,0,255,0.05); }

        #error-msg { color: #ff3333; font-size: 11px; font-weight: bold; display: none; margin-bottom: 15px; }

        .btn-main {
            display: block; width: 100%; padding: 18px; margin-top: 20px;
            border-radius: 15px; background: #222; color: #555;
            text-align: center; font-weight: 900; text-decoration: none;
            pointer-events: none; border: none; text-transform: uppercase;
            font-size: 14px; transition: 0.4s;
        }
        .btn-main.ready {
            background: var(--fucsia); color: white;
            box-shadow: 0 0 25px var(--fucsia); pointer-events: auto; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="lock-icon">🔒</div>
        <h1>XitzX7</h1>
        <p class="sub">Panel de acceso exclusivo</p>

        <div id="error-msg">⚠️ ERROR: (completa los pasos de verdad)</div>

        <div class="selector-container">
            <button class="file-option" id="opt1" onclick="elegir(1, 'https://youtu.be/S3RC2xLkMQI', 'https://www.mediafire.com/file/ttzvvdjpkqcn151/AUTO+APUNTADO+100')">
                17 DE ABRIL<br>AUTO APUNTADO
            </button>
            <button class="file-option" id="opt2" onclick="elegir(2, 'URL_VIDEO_18', 'URL_MEDIAFIRE_18')">
                18 DE ABRIL<br>NUEVO MÉTODO
            </button>
        </div>

        <div id="misiones" class="misiones-box">
            <a href="#" target="_blank" class="step-btn" id="s1" onclick="verificar(1)">1. Suscribirse</a>
            <a href="#" target="_blank" class="step-btn" id="s2" onclick="verificar(2)">2. Dar Like</a>
            <a href="#" target="_blank" class="step-btn" id="s3" onclick="verificar(3)">3. Comentar</a>
            <a href="https://whatsapp.com/channel/0029VbCKayIJkK79xojzCS1a" target="_blank" class="step-btn" id="s4" onclick="verificar(4)">4. Unirse al WhatsApp</a>
            
            <button id="download-btn" class="btn-main">LINK BLOQUEADO</button>
        </div>
    </div>

    <script>
        let tareas = { 1: false, 2: false, 3: false, 4: false };
        let timerOut = 0;
        let completadas = 0;
        let linkFinal = "";

        function elegir(n, video, descarga) {
            // Activar visualmente la opción
            document.querySelectorAll('.file-option').forEach(o => o.classList.remove('active'));
            document.getElementById('opt' + n).classList.add('active');
            
            // Asignar links
            linkFinal = descarga;
            document.getElementById('s1').href = "https://www.youtube.com/@XitzX7?sub_confirmation=1";
            document.getElementById('s2').href = video;
            document.getElementById('s3').href = video;
            
            // Mostrar misiones
            document.getElementById('misiones').style.display = 'block';
        }

        function verificar(n) {
            if (tareas[n] || linkFinal === "") return;
            timerOut = Date.now();
            const btn = document.getElementById('s' + n);

            window.onfocus = function() {
                let segs = (Date.now() - timerOut) / 1000;
                if (segs < 1.9) {
                    document.getElementById('error-msg').style.display = 'block';
                } else {
                    document.getElementById('error-msg').style.display = 'none';
                    tareas[n] = true;
                    btn.classList.add('done');
                    btn.innerText = "✓ COMPLETADO";
                    completadas++;
                    
                    if (completadas >= 4) {
                        window.liberarUsuario();
                        const dl = document.getElementById('download-btn');
                        dl.innerText = "ENTRAR AL ARCHIVO →";
                        dl.classList.add('ready');
                        dl.onclick = function() { window.location.href = linkFinal; };
                    }
                }
                window.onfocus = null;
            };
        }
    </script>
</body>
</html>
